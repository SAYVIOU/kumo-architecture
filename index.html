<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Kumo Analyst — Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0d0d; --bg2: #141414; --bg3: #1a1a1a;
  --border: #2a2a2a; --border2: #333;
  --text: #e0e0e0; --muted: #555; --muted2: #444;
  --green: #22c55e; --blue: #3b82f6; --purple: #a855f7;
  --orange: #f97316; --red: #ef4444; --yellow: #eab308;
  --cyan: #06b6d4;
}
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; height: 100vh; overflow: hidden; user-select: none; }
body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px); background-size: 28px 28px; opacity: 0.4; pointer-events: none; z-index: 0; }

/* Topbar */
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
.topbar-logo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.topbar-badge { font-size: 9px; padding: 2px 8px; border-radius: 3px; background: #1a1a1a; border: 1px solid var(--border2); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
.topbar-right { display: flex; align-items: center; gap: 20px; font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Canvas */
#canvas { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; z-index: 1; overflow: hidden; cursor: grab; }
#canvas.panning { cursor: grabbing; }
#world { position: absolute; width: 4000px; height: 3000px; transform-origin: 0 0; }
#svg-layer { position: absolute; top: 0; left: 0; width: 4000px; height: 3000px; pointer-events: none; }

/* Group labels */
.group-label { position: absolute; font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: #2a2a2a; pointer-events: none; z-index: 2; }
.group-bg { position: absolute; border-radius: 14px; border: 1px dashed #1e1e1e; background: rgba(255,255,255,0.005); pointer-events: none; z-index: 2; }

/* Nodes */
.node { position: absolute; width: 190px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; cursor: grab; z-index: 10; transition: border-color 0.15s, box-shadow 0.15s; }
.node:hover { border-color: var(--accent-color, #444); box-shadow: 0 0 0 1px var(--accent-color, #444), 0 8px 24px rgba(0,0,0,.5); }
.node.active { border-color: var(--accent-color, #444) !important; box-shadow: 0 0 0 2px var(--accent-color, #444), 0 12px 32px rgba(0,0,0,.6) !important; }
.node.dragging { cursor: grabbing; z-index: 100; box-shadow: 0 20px 60px rgba(0,0,0,.8); transform: scale(1.02); }
.node-header { padding: 10px 12px 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
.node-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.node-title { font-size: 11px; font-weight: 600; color: var(--text); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-sub { padding: 5px 12px 8px; font-size: 9px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
.port { position: absolute; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #333; background: #1a1a1a; top: 50%; transform: translateY(-50%); transition: all .15s; z-index: 11; }
.port-out { right: -5px; }
.port-in { left: -5px; }
.node:hover .port { border-color: var(--accent-color, #555); background: var(--accent-color, #555); }

/* Panel */
#panel { position: fixed; right: -390px; top: 48px; bottom: 0; width: 370px; background: var(--bg2); border-left: 1px solid var(--border); z-index: 50; transition: right .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
#panel.open { right: 0; }
.panel-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.panel-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.panel-title { font-size: 13px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--text); margin-bottom: 3px; }
.panel-type { font-size: 9px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
.panel-close { background: none; border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 5px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.panel-close:hover { border-color: var(--border2); color: var(--text); }
.panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.panel-section { margin-bottom: 18px; }
.panel-section-title { font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
.panel-desc { font-size: 12px; color: #999; line-height: 1.75; }
.panel-tag { display: inline-flex; padding: 2px 9px; border-radius: 3px; font-size: 9px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; margin: 2px; border: 1px solid transparent; letter-spacing: .5px; }
.panel-field { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin-bottom: 6px; }
.panel-field-label { font-size: 8px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.panel-field-value { font-size: 11px; color: var(--text); font-family: 'IBM Plex Mono', monospace; word-break: break-all; line-height: 1.5; }
.panel-field-value.hi { color: var(--cyan); }
.panel-flow { display: flex; flex-direction: column; gap: 3px; }
.panel-flow-step { display: flex; align-items: center; gap: 8px; padding: 6px 9px; background: var(--bg3); border-radius: 4px; border: 1px solid var(--border); font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: #999; }
.panel-flow-num { width: 16px; height: 16px; border-radius: 50%; background: var(--border2); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.tag-green { background: #16a34a18; color: var(--green); border-color: #16a34a35; }
.tag-blue { background: #2563eb18; color: var(--blue); border-color: #2563eb35; }
.tag-purple { background: #9333ea18; color: var(--purple); border-color: #9333ea35; }
.tag-orange { background: #ea580c18; color: var(--orange); border-color: #ea580c35; }
.tag-red { background: #dc262618; color: var(--red); border-color: #dc262635; }
.tag-yellow { background: #ca8a0418; color: var(--yellow); border-color: #ca8a0435; }
.tag-cyan { background: #0891b218; color: var(--cyan); border-color: #0891b235; }

/* Controls */
#controls { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 4px; z-index: 50; }
.ctrl-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 5px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; font-family: 'IBM Plex Mono', monospace; }
.ctrl-btn:hover { border-color: var(--border2); color: var(--text); }
#zoom-label { background: var(--bg2); border: 1px solid var(--border); color: var(--muted); height: 32px; padding: 0 10px; border-radius: 5px; display: flex; align-items: center; font-size: 10px; font-family: 'IBM Plex Mono', monospace; }

/* Legend */
#legend { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; z-index: 50; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 9px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.legend-item:last-child { margin-bottom: 0; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* Tooltip */
#tooltip { position: fixed; background: var(--bg2); border: 1px solid var(--border2); border-radius: 4px; padding: 5px 10px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text); pointer-events: none; z-index: 200; opacity: 0; transition: opacity .1s; white-space: nowrap; }

/* Panel handle (mobile) */
.panel-handle { display: none; width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 0; }

/* Hint textes */
.hint-mobile { display: none; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  /* Topbar simplifié */
  .topbar { padding: 0 14px; }
  .topbar-right > span:not(:first-child) { display: none; }
  .hint-desktop { display: none; }
  .hint-mobile { display: inline; }

  /* Canvas */
  #canvas { touch-action: none; }

  /* Panel — slide depuis le bas */
  #panel {
    width: 100%;
    right: 0 !important;
    top: auto;
    bottom: -80vh;
    height: 75vh;
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0;
    transition: bottom 0.3s cubic-bezier(.4,0,.2,1);
  }
  #panel.open { bottom: 0; }
  .panel-handle { display: block; }

  /* Boutons de contrôle plus grands */
  .ctrl-btn { width: 44px; height: 44px; font-size: 18px; }
  #zoom-label { height: 44px; padding: 0 12px; font-size: 11px; }
  #controls { bottom: 16px; left: 12px; gap: 6px; }

  /* Légende masquée (trop petite sur mobile) */
  #legend { display: none; }

  /* Nœuds légèrement plus larges */
  .node { width: 170px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    📡 KUMO ANALYST
    <div class="topbar-badge">Architecture v2.0</div>
  </div>
  <div class="topbar-right">
    <span><span class="live-dot"></span>Bot actif — Wispbyte 24/7</span>
    <span>7 APIs</span>
    <span>4 Salons Discord</span>
    <span>5 Automatisations</span>
    <span style="color:#333">|</span>
    <span style="color:#444;font-size:9px" class="hint-desktop">Glisser les nœuds • Cliquer pour détails • Scroll pour zoomer</span>
    <span style="color:#444;font-size:9px" class="hint-mobile">Pincer pour zoomer • Appuyer pour détails</span>
  </div>
</div>

<div id="canvas">
  <div id="world">
    <svg id="svg-layer"></svg>
  </div>
</div>

<div id="panel">

  <div class="panel-header">

      <div class="panel-icon" id="panel-icon"></div>
      <div style="min-width:0">
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-type" id="panel-type"></div>
      </div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="zoomIn()" title="Zoom +">+</button>
  <button class="ctrl-btn" onclick="zoomOut()" title="Zoom -">−</button>
  <div id="zoom-label">100%</div>

</div>

<div id="legend">

  <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div>Infrastructure</div>
</div>

<div id="tooltip"></div>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const world = document.getElementById('world');
const svgEl = document.getElementById('svg-layer');
const nodeEls = {};
const nodePositions = {}; // live positions

let scale = 0.75, tx = 40, ty = 40;
let isPanning = false, panStart = {}, panTxStart = 0, panTyStart = 0;
let draggingNode = null, dragOffsetX = 0, dragOffsetY = 0;
let activeNodeId = null;

// Init positions
nodes.forEach(n => { nodePositions[n.id] = { x: n.x, y: n.y }; });

// ─────────────────────────────────────────────
// CREATE NODES
// ─────────────────────────────────────────────
nodes.forEach(n => {
  const el = document.createElement('div');
  el.className = 'node';
  el.id = 'node-' + n.id;
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';
  el.style.setProperty('--accent-color', n.color);
  el.innerHTML = `
    <div class="node-header">
      <div class="node-icon" style="background:${n.color}20;border:1px solid ${n.color}40">${n.icon}</div>
      <div class="node-title">${n.title}</div>
    </div>
    <div class="node-sub">${n.sub}</div>
    <div class="port port-in"></div>
    <div class="port port-out"></div>
  `;

  // Click to open panel
  el.addEventListener('click', e => {
    if (Math.abs(e.clientX - dragStartClient.x) < 4 && Math.abs(e.clientY - dragStartClient.y) < 4) {
      openPanel(n);
    }
  });

  // Drag
  el.addEventListener('mousedown', e => {
    e.stopPropagation();
    draggingNode = n.id;
    dragStartClient = { x: e.clientX, y: e.clientY };
    const pos = nodePositions[n.id];
    dragOffsetX = e.clientX / scale - pos.x;
    dragOffsetY = e.clientY / scale - pos.y;
    el.classList.add('dragging');
    document.body.style.cursor = 'grabbing';
  });

  world.appendChild(el);
  nodeEls[n.id] = el;
});

// ─────────────────────────────────────────────
// SVG CONNECTIONS
// ─────────────────────────────────────────────
const NODE_W = 190, NODE_H = 76;

function getPort(id, side) {
  const p = nodePositions[id];
  if (!p) return { x: 0, y: 0 };
  return side === 'out'
    ? { x: p.x + NODE_W, y: p.y + NODE_H / 2 }
    : { x: p.x,          y: p.y + NODE_H / 2 };
}

function redrawConnections() {
  svgEl.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  connections.forEach((c, i) => {
    const from = getPort(c.from, 'out');
    const to   = getPort(c.to,   'in');
    const dx   = Math.max(60, Math.abs(to.x - from.x) * 0.5);

    const pathId = `path-${i}`;
    const d = `M ${from.x} ${from.y} C ${from.x + dx} ${from.y}, ${to.x - dx} ${to.y}, ${to.x} ${to.y}`;

    // Main line
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('id', pathId);
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', c.color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.3');
    if (c.dash) path.setAttribute('stroke-dasharray', c.dash);
    svgEl.appendChild(path);

    // Animated dot
    if (!c.dash) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('r', '2.5');
      dot.setAttribute('fill', c.color);
      dot.setAttribute('opacity', '0.8');
      const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
      anim.setAttribute('dur', (1.5 + (i % 5) * 0.7) + 's');
      anim.setAttribute('repeatCount', 'indefinite');
      const mpath = document.createElementNS('http://www.w3.org/2000/svg', 'mpath');
      mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#' + pathId);
      anim.appendChild(mpath);
      dot.appendChild(anim);
      svgEl.appendChild(dot);
    }
  });
}

redrawConnections();

// ─────────────────────────────────────────────
// DRAG LOGIC
// ─────────────────────────────────────────────
let dragStartClient = { x: 0, y: 0 };

document.addEventListener('mousemove', e => {
  if (draggingNode) {
    const pos = nodePositions[draggingNode];
    const newX = e.clientX / scale - dragOffsetX;
    const newY = e.clientY / scale - dragOffsetY;
    pos.x = newX;
    pos.y = newY;
    const el = nodeEls[draggingNode];
    el.style.left = newX + 'px';
    el.style.top  = newY + 'px';
    redrawConnections();
    return;
  }

  if (isPanning) {
    tx = panTxStart + (e.clientX - panStart.x);
    ty = panTyStart + (e.clientY - panStart.y);
    applyTransform();
  }
});

document.addEventListener('mouseup', () => {
  if (draggingNode) {
    nodeEls[draggingNode].classList.remove('dragging');
    draggingNode = null;
    document.body.style.cursor = '';
  }
  isPanning = false;
  document.getElementById('canvas').classList.remove('panning');
});

// ─────────────────────────────────────────────
// PAN (canvas background)
// ─────────────────────────────────────────────
document.getElementById('canvas').addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  isPanning = true;
  panStart = { x: e.clientX, y: e.clientY };
  panTxStart = tx; panTyStart = ty;
  document.getElementById('canvas').classList.add('panning');
});

// ─────────────────────────────────────────────
// ZOOM
// ─────────────────────────────────────────────
document.getElementById('canvas').addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = document.getElementById('canvas').getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * factor;
  ty = my - (my - ty) * factor;
  scale = Math.max(0.25, Math.min(2.5, scale * factor));
  applyTransform();
}, { passive: false });

function zoomIn()  { scale = Math.min(2.5, scale * 1.15); applyTransform(); }
function zoomOut() { scale = Math.max(0.25, scale * 0.87); applyTransform(); }
function resetView() { scale = 0.75; tx = 40; ty = 40; applyTransform(); }

function applyTransform() {
  world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}
applyTransform();

// ─────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────
function openPanel(n) {
  if (activeNodeId) nodeEls[activeNodeId]?.classList.remove('active');
  activeNodeId = n.id;
  nodeEls[n.id].classList.add('active');

  document.getElementById('panel-icon').style.background = n.color + '25';
  document.getElementById('panel-icon').style.border = '1px solid ' + n.color + '50';
  document.getElementById('panel-icon').textContent = n.icon;
  document.getElementById('panel-title').textContent = n.title;
  document.getElementById('panel-type').textContent = n.type;

  let html = `<div class="panel-section"><div class="panel-section-title">Description</div><div class="panel-desc">${n.desc}</div></div>`;

  if (n.tags?.length) {
    html += `<div class="panel-section"><div class="panel-section-title">Tags</div><div>${n.tags.map(t => `<span class="panel-tag ${t.c}">${t.l}</span>`).join('')}</div></div>`;
  }

  if (n.fields?.length) {
    html += `<div class="panel-section"><div class="panel-section-title">Configuration</div>`;
    n.fields.forEach(f => {
      html += `<div class="panel-field"><div class="panel-field-label">${f.label}</div><div class="panel-field-value ${f.hi ? 'hi' : ''}">${f.value}</div></div>`;
    });
    html += `</div>`;
  }

  if (n.flow?.length) {
    html += `<div class="panel-section"><div class="panel-section-title">Flux d'exécution</div><div class="panel-flow">`;
    n.flow.forEach((s, i) => {
      html += `<div class="panel-flow-step"><div class="panel-flow-num">${i + 1}</div>${s}</div>`;
    });
    html += `</div></div>`;
  }

  const inc = connections.filter(c => c.to === n.id);
  const out = connections.filter(c => c.from === n.id);
  if (inc.length || out.length) {
    html += `<div class="panel-section"><div class="panel-section-title">Connexions</div>`;
    if (inc.length) html += `<div class="panel-field"><div class="panel-field-label">← Entrées (${inc.length})</div><div class="panel-field-value">${inc.map(c => { const s = nodes.find(x => x.id === c.from); return s ? s.icon + ' ' + s.title : c.from; }).join('<br>')}</div></div>`;
    if (out.length) html += `<div class="panel-field"><div class="panel-field-label">→ Sorties (${out.length})</div><div class="panel-field-value">${out.map(c => { const d = nodes.find(x => x.id === c.to); return d ? d.icon + ' ' + d.title : c.to; }).join('<br>')}</div></div>`;
    html += `</div>`;
  }

  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeNodeId) nodeEls[activeNodeId]?.classList.remove('active');
  activeNodeId = null;
}

// ─────────────────────────────────────────────
// TOUCH SUPPORT (pinch-to-zoom + pan + tap)
// ─────────────────────────────────────────────
let pinching = false;
let lastTouchDist = 0;
let lastPinchMid = { x: 0, y: 0 };

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function getTouchMid(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
  };
}

// Ajout touchstart sur chaque nœud
nodes.forEach(n => {
  const el = nodeEls[n.id];
  el.addEventListener('touchstart', e => {
    e.stopPropagation();
    const touch = e.touches[0];
    draggingNode = n.id;
    dragStartClient = { x: touch.clientX, y: touch.clientY };
    const pos = nodePositions[n.id];
    dragOffsetX = touch.clientX / scale - pos.x;
    dragOffsetY = touch.clientY / scale - pos.y;
    el.classList.add('dragging');
  }, { passive: true });
});

// Canvas touch : pan 1 doigt / pinch 2 doigts
const canvasEl = document.getElementById('canvas');
canvasEl.addEventListener('touchstart', e => {
  if (e.target.closest('.node')) return;
  e.preventDefault();
  if (e.touches.length === 2) {
    pinching = true;
    isPanning = false;
    lastTouchDist = getTouchDist(e);
    lastPinchMid = getTouchMid(e);
  } else if (e.touches.length === 1) {
    pinching = false;
    isPanning = true;
    panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    panTxStart = tx; panTyStart = ty;
    canvasEl.classList.add('panning');
  }
}, { passive: false });

canvasEl.addEventListener('touchmove', e => {
  if (e.target.closest('.node') && draggingNode) return;
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = getTouchDist(e);
    const mid = getTouchMid(e);
    const rect = canvasEl.getBoundingClientRect();
    if (pinching && lastTouchDist > 0) {
      const factor = dist / lastTouchDist;
      const mx = mid.x - rect.left;
      const my = mid.y - rect.top;
      tx = mx - (mx - tx) * factor;
      ty = my - (my - ty) * factor;
      scale = Math.max(0.25, Math.min(2.5, scale * factor));
    }
    tx += mid.x - lastPinchMid.x;
    ty += mid.y - lastPinchMid.y;
    applyTransform();
    lastTouchDist = dist;
    lastPinchMid = mid;
    pinching = true;
  } else if (e.touches.length === 1 && isPanning && !draggingNode) {
    tx = panTxStart + (e.touches[0].clientX - panStart.x);
    ty = panTyStart + (e.touches[0].clientY - panStart.y);
    applyTransform();
  }
}, { passive: false });

canvasEl.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    pinching = false; isPanning = false; lastTouchDist = 0;
    canvasEl.classList.remove('panning');
  } else if (e.touches.length === 1) {
    pinching = false; lastTouchDist = 0;
    if (!draggingNode) {
      isPanning = true;
      panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      panTxStart = tx; panTyStart = ty;
    }
  }
}, { passive: true });

// Drag nœud au doigt
document.addEventListener('touchmove', e => {
  if (!draggingNode) return;
  e.preventDefault();
  const touch = e.touches[0];
  const pos = nodePositions[draggingNode];
  const newX = touch.clientX / scale - dragOffsetX;
  const newY = touch.clientY / scale - dragOffsetY;
  pos.x = newX; pos.y = newY;
  nodeEls[draggingNode].style.left = newX + 'px';
  nodeEls[draggingNode].style.top  = newY + 'px';
  redrawConnections();
}, { passive: false });

// Relâchement : tap = ouvrir panel, drag = déplacer
document.addEventListener('touchend', e => {
  if (draggingNode) {
    const touch = e.changedTouches[0];
    if (Math.abs(touch.clientX - dragStartClient.x) < 8 && Math.abs(touch.clientY - dragStartClient.y) < 8) {
      const node = nodes.find(n => n.id === draggingNode);
      if (node) openPanel(node);
    }
    nodeEls[draggingNode].classList.remove('dragging');
    draggingNode = null;
    document.body.style.cursor = '';
  }
  if (e.touches.length === 0) {
    isPanning = false; pinching = false;
    canvasEl.classList.remove('panning');
  }
});
